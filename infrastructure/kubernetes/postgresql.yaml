apiVersion: v1
kind: Service
metadata:
  name: rimawari-postgresql
  namespace: production
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      name: postgresql
  selector:
    app: rimawari-postgresql
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rimawari-postgresql
  namespace: production
spec:
  serviceName: rimawari-postgresql
  replicas: 1
  selector:
    matchLabels:
      app: rimawari-postgresql
  template:
    metadata:
      labels:
        app: rimawari-postgresql
    spec:
      containers:
        - name: postgresql
          image: pgvector/pgvector:pg16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_DB
              value: "serverpod"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rimawari-postgresql
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "serverpod"]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "serverpod"]
            initialDelaySeconds: 5
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
