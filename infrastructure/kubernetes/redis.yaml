apiVersion: v1
kind: Service
metadata:
  name: rimawari-redis
  namespace: production
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
  selector:
    app: rimawari-redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rimawari-redis
  namespace: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rimawari-redis
  template:
    metadata:
      labels:
        app: rimawari-redis
    spec:
      containers:
        - name: redis
          image: redis:6.2.6
          command:
            - redis-server
            - --requirepass
            - $(REDIS_PASSWORD)
            - --appendonly
            - "yes"
          ports:
            - containerPort: 6379
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rimawari-redis
                  key: password
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
