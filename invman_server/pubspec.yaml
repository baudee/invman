name: invman_server
description: Starting point for a Serverpod server.

environment:
  sdk: '^3.11.0'

dependencies:
  csv: ^6.0.0
  dotenv: 4.2.0
  get_it: 9.2.0
  http: 1.6.0
  injectable: 2.7.1
  postgres: ^3.5.6
  serverpod: 3.3.1
  serverpod_auth_idp_server: 3.3.1
  yaml: ^3.1.3

dev_dependencies:
  build_runner: 2.11.0
  injectable_generator: 2.11.1
  lints: '>=3.0.0 <7.0.0'
  serverpod_test: 3.3.1
  test: ^1.25.5


  serverpod_auth_core_server: any
serverpod:
  scripts:
    # Starts the server and applies migrations
    start: dart bin/main.dart --apply-migrations

    # Build the Flutter web app and move it to the server's web directory
    # 
    # Unfortunately, we can't use the `-o` flag directly because of an error
    # that happens on windows. Issue is tracked in the flutter
    # repository here: https://github.com/flutter/flutter/issues/157886
    flutter_build: cd ../invman_flutter && flutter build web --base-href /app/ --wasm && rm -rf ../invman_server/web/app && mv build/web/ ../invman_server/web/app
