class: Investment

table: investment

fields:
  user: module:serverpod_auth_core:AuthUser?, relation(onDelete=Cascade)
  name: String
  asset: Asset?, relation(name=asset_investments)
  withdrawalRule : WithdrawalRule?, relation(optional)
  transfers: List<Transfer>?, relation(optional, name=investment_transfers)
  investAmount: double, default=0.0
  quantity: double, default=0.0
  updatedAt: DateTime, default=now
  withdrawAmount: double?, !persist
  forex: Forex?, !persist
  returnPercentage: double?, !persist
  realizedProfit: double?, !persist
  unrealizedProfit: double?, !persist
  totalProfit: double?, !persist


indexes:
  investment_user_idx:
    fields: userId
