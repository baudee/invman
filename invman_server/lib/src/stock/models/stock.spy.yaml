class: Stock

table: stock

fields:
  id: UuidValue, defaultModel=random,
  symbol: String,
  shortName: String,
  longName: String,
  quoteType: StockType,
  logoUrl: String?,
  currency: Currency?, relation
  prices: List<StockPrice>?, relation(optional, name=stock_stock_prices)

indexes:
  stock_symbol_idx:
    fields: symbol
    unique: true