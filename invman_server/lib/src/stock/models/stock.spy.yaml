class: Stock

table: stock

fields:
  id: UuidValue, defaultModel=random,
  symbol: String,
  name: String,
  quoteType: StockType,
  logoUrl: String?,
  price: double, defaultModel=0.0,
  updatedAt: DateTime, defaultModel=now,
  currency: Currency?, relation

indexes:
  stock_symbol_idx:
    fields: symbol
    unique: true
  stock_name_idx:
    fields: name