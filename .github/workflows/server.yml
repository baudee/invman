name: Server Workflow

permissions:
  contents: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches:
      - main
    paths:
      - 'invman_server/**'
  push:
    branches:
      - main
    paths:
      - 'invman_server/**'
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  WORK_DIR: invman_server

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{env.WORK_DIR}}

    steps:
      - name: 🛠️ Checkout code
        uses: actions/checkout@v3

      - name: 📋 Extract versions from pubspec.yaml
        id: versions
        run: |
          SERVERPOD_VERSION=$(grep "serverpod:" pubspec.yaml | head -1 | sed 's/.*serverpod: //')
          echo "serverpod=${SERVERPOD_VERSION}" >> $GITHUB_OUTPUT
          # Get Flutter version from the Flutter app pubspec
          FLUTTER_VERSION=$(grep "flutter:" ../invman_flutter/pubspec.yaml | grep -v "sdk:" | head -1 | sed 's/.*flutter: //')
          echo "flutter=${FLUTTER_VERSION}" >> $GITHUB_OUTPUT

      - name: Write password file
        uses: timheuer/base64-to-file@v1.2
        with:
          fileName: 'passwords.yaml'
          fileDir: ${{env.WORK_DIR}}/config/
          encodedString: ${{ secrets.PASSWORDS_BASE64 }}

      - name: ⚙️ Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: ${{ steps.versions.outputs.flutter }}
          cache: true

      - name: 🔧 Build (matching Makefile server/build)
        run: |
          dart pub get
          dart run build_runner build --delete-conflicting-outputs
          dart pub global activate serverpod_cli ${{ steps.versions.outputs.serverpod }}
          serverpod generate

      - name: ✅ Run tests (matching Makefile server/test)
        run: |
          dart fix --apply
          dart format .
          dart analyze
          dart test -x integration --coverage=coverage

      - name: 📊 Generate coverage report
        run: |
          dart pub global activate coverage
          dart pub global run coverage:format_coverage \
            --lcov \
            --in=coverage \
            --out=coverage/lcov.info \
            --packages=.dart_tool/package_config.json

      - name: 📄 Report code coverage
        if: github.event_name == 'pull_request'
        uses: romeovs/lcov-reporter-action@v0.3.1
        with:
          lcov-file: coverage/lcov.info
          github-token: ${{ secrets.GITHUB_TOKEN }}
          title: 'Backend Coverage Report'

  build-and-push-image:
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    needs: test

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{env.WORK_DIR}}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: 📋 Extract versions from pubspec.yaml
        id: versions
        run: |
          SERVERPOD_VERSION=$(grep "serverpod:" pubspec.yaml | head -1 | sed 's/.*serverpod: //')
          echo "serverpod=${SERVERPOD_VERSION}" >> $GITHUB_OUTPUT
          FLUTTER_VERSION=$(grep "flutter:" ../invman_flutter/pubspec.yaml | grep -v "sdk:" | head -1 | sed 's/.*flutter: //')
          echo "flutter=${FLUTTER_VERSION}" >> $GITHUB_OUTPUT

      - name: ⚙️ Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: ${{ steps.versions.outputs.flutter }}
          cache: true

      - name: 🔧 Build (matching Makefile server/build)
        run: |
          dart pub get
          dart run build_runner build --delete-conflicting-outputs
          dart pub global activate serverpod_cli ${{ steps.versions.outputs.serverpod }}
          serverpod generate

      - name: Write password file
        uses: timheuer/base64-to-file@v1.2
        with:
          fileName: 'passwords.yaml'
          fileDir: ${{env.WORK_DIR}}/config/
          encodedString: ${{ secrets.PASSWORDS_BASE64 }}

      - name: Create .env File
        run: |
          echo "YFIN_BASE_URL=${{ vars.YFIN_BASE_URL }}" > .env

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "tag=${VERSION}" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{env.WORK_DIR}}
          push: true
          tags: ghcr.io/baudee/invman:${{ steps.version.outputs.tag }}
          labels: ${{ steps.meta.outputs.labels }}
