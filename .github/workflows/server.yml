name: Server Workflow

permissions:
  contents: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches:
      - main
    paths:
      - 'invman_server/**'
  push:
    branches:
      - main
    paths:
      - 'invman_server/**'
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  WORK_DIR: invman_server
  SERVERPOD_VERSION: 3.1.1
  FLUTTER_VERSION: 3.38.x

jobs:
  unit_tests_and_coverage:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{env.WORK_DIR}}

    steps:
      - name: 🛠️ Checkout code
        uses: actions/checkout@v3

      - name: Write password file
        id: write_file
        uses: timheuer/base64-to-file@v1.2
        with:
          fileName: 'passwords.yaml'
          fileDir: ${{env.WORK_DIR}}/config/
          encodedString: ${{ secrets.PASSWORDS_BASE64 }}

      - name: ⚙️ Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: 🔧 Install dependencies
        run: |
          dart pub get
          dart pub global activate serverpod_cli ${{ env.SERVERPOD_VERSION }}

      - name: ✨ Serverpod generate
        run: |
          serverpod generate

      - name: ▶️ Run tests with coverage
        run: |
          dart test -x integration --coverage=coverage
          dart pub global activate coverage
          dart pub global run coverage:format_coverage \
            --lcov \
            --in=coverage \
            --out=coverage/lcov.info \
            --packages=.dart_tool/package_config.json

      - name: 📄 Report code coverage
        if: github.event_name == 'pull_request'
        uses: romeovs/lcov-reporter-action@v0.3.1
        with:
          lcov-file: coverage/lcov.info
          github-token: ${{ secrets.GITHUB_TOKEN }}
          title: 'Backend Coverage Report'

  build-and-push-image:
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    needs: unit_tests_and_coverage

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{env.WORK_DIR}}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: ⚙️ Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: 🔧 Install dependencies
        run: |
          dart pub get
          dart pub global activate serverpod_cli ${{ env.SERVERPOD_VERSION }}

      - name: ✨ Serverpod generate
        run: |
          serverpod generate

      - name: Write password file
        id: write_file
        uses: timheuer/base64-to-file@v1.2
        with:
          fileName: 'passwords.yaml'
          fileDir: ${{env.WORK_DIR}}/config/
          encodedString: ${{ secrets.PASSWORDS_BASE64 }}

      - name: Create .env File
        run: |
          echo "YFIN_BASE_URL=${{ vars.YFIN_BASE_URL }}" > .env

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "tag=${VERSION}" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{env.WORK_DIR}}
          push: true
          tags: ghcr.io/baudee/invman:${{ steps.version.outputs.tag }}
          labels: ${{ steps.meta.outputs.labels }}
