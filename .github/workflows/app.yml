name: App Workflow

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches:
      - main
    paths:
      - "invman_flutter/**"
      - "invman_client/**"
  push:
    branches:
      - main
    paths:
      - "invman_flutter/**"
      - "invman_client/**"
    tags:
      - "v*"

env:
  WORK_DIR: invman_flutter

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{env.WORK_DIR}}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Extract Flutter version from pubspec.yaml
        id: flutter_version
        run: |
          FLUTTER_VERSION=$(grep "flutter:" pubspec.yaml | grep -v "sdk:" | head -1 | sed 's/.*flutter: //')
          echo "version=${FLUTTER_VERSION}" >> $GITHUB_OUTPUT

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: ${{ steps.flutter_version.outputs.version }}
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            ${{ env.WORK_DIR }}/.dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install LCOV
        run: |
          sudo apt-get update
          sudo apt-get -y install lcov

      - name: Build
        run: |
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs
          dart run intl_utils:generate

      - name: Run tests
        run: |
          dart analyze
          flutter test --coverage

      - name: Report code coverage
        if: github.event_name == 'pull_request'
        uses: romeovs/lcov-reporter-action@v0.3.1
        with:
          lcov-file: invman_flutter/coverage/lcov.info
          github-token: ${{ secrets.GITHUB_TOKEN }}
          title: "Frontend Coverage Report"

  release-android:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{env.WORK_DIR}}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Extract Flutter version from pubspec.yaml
        id: flutter_version
        run: |
          FLUTTER_VERSION=$(grep "flutter:" pubspec.yaml | grep -v "sdk:" | head -1 | sed 's/.*flutter: //')
          echo "version=${FLUTTER_VERSION}" >> $GITHUB_OUTPUT

      - name: Extract version from tag
        id: version
        run: |
          VERSION_RAW=${GITHUB_REF#refs/tags/v}
          VERSION=${VERSION_RAW%%-*}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          IFS='.' read -ra PARTS <<< "$VERSION"
          MAJOR=${PARTS[0]:-0}
          MINOR=${PARTS[1]:-0}
          PATCH=${PARTS[2]:-0}
          BUILD_NUMBER=$((MAJOR * 1000000 + MINOR * 1000 + PATCH))
          echo "build_number=${BUILD_NUMBER}" >> $GITHUB_OUTPUT

      - name: Determine Play Store track
        id: track
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          if [[ "$TAG" == *-* ]]; then
            SUFFIX="${TAG#*-}"
            case "$SUFFIX" in
              beta)  TRACK="beta" ;;
              alpha) TRACK="alpha" ;;
              *)     TRACK="internal" ;;
            esac
          else
            TRACK="production"
          fi
          echo "track=${TRACK}" >> $GITHUB_OUTPUT

      - name: Set Up Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: ${{ steps.flutter_version.outputs.version }}
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            ${{ env.WORK_DIR }}/.dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: |
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs
          dart run intl_utils:generate

      - name: Create .env File
        run: |
          echo "BASE_URL=${{ vars.BASE_URL }}" > .env
          echo "SENTRY_DSN=${{ vars.SENTRY_DSN }}" >> .env
          echo "IOS_REVENUE_CAT_API_KEY=${{ secrets.IOS_REVENUE_CAT_API_KEY }}" >> .env
          echo "ANDROID_REVENUE_CAT_API_KEY=${{ secrets.ANDROID_REVENUE_CAT_API_KEY }}" >> .env

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=upload" >> android/key.properties
          echo "storeFile=keystore.jks" >> android/key.properties

      - name: Verify signing setup
        run: |
          echo "Checking signing configuration..."
          if [ ! -f android/key.properties ]; then
            echo "ERROR: key.properties not found"
            exit 1
          fi
          if [ ! -f android/app/keystore.jks ]; then
            echo "ERROR: keystore.jks not found"
            exit 1
          fi
          echo "Signing configuration OK"

      - name: Build Release APK & App Bundle
        run: |
          flutter build apk --release \
            --flavor production \
            --dart-define-from-file .env \
            --obfuscate \
            --split-debug-info=build/debug-info \
            --build-name=${{ steps.version.outputs.version }} \
            --build-number=${{ steps.version.outputs.build_number }}
          flutter build appbundle --release \
            --flavor production \
            --dart-define-from-file .env \
            --obfuscate \
            --split-debug-info=build/debug-info \
            --build-name=${{ steps.version.outputs.version }} \
            --build-number=${{ steps.version.outputs.build_number }}

      - name: Verify release signing
        run: |
          echo "Verifying APK is release-signed..."
          APK_PATH="build/app/outputs/flutter-apk/app-production-release.apk"
          SIGNER_INFO=$(jarsigner -verify -verbose -certs "$APK_PATH" 2>&1 | head -20)
          if echo "$SIGNER_INFO" | grep -q "Android Debug"; then
            echo "ERROR: APK is signed with debug key!"
            echo "$SIGNER_INFO"
            exit 1
          fi
          echo "APK is properly release-signed"

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: android-release-${{ steps.version.outputs.version }}
          path: |
            invman_flutter/build/app/outputs/flutter-apk/app-production-release.apk
            invman_flutter/build/app/outputs/bundle/productionRelease/app-production-release.aab
          if-no-files-found: error
          retention-days: 7

      - name: Upload symbols to Sentry (Android)
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
        run: |
          curl -sL https://sentry.io/get-cli/ | bash
          sentry-cli debug-files upload --include-sources build/debug-info

      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: ch.valentinbaudin.rimawari
          releaseFiles: invman_flutter/build/app/outputs/bundle/productionRelease/app-production-release.aab
          track: ${{ steps.track.outputs.track }}
          status: completed
          whatsNewDirectory: invman_flutter/distribution/whatsnew

  release-ios:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: macos-15

    defaults:
      run:
        working-directory: ${{env.WORK_DIR}}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Extract Flutter version from pubspec.yaml
        id: flutter_version
        run: |
          FLUTTER_VERSION=$(grep "flutter:" pubspec.yaml | grep -v "sdk:" | head -1 | sed 's/.*flutter: //')
          echo "version=${FLUTTER_VERSION}" >> $GITHUB_OUTPUT

      - name: Extract version from tag
        id: version
        run: |
          VERSION_RAW=${GITHUB_REF#refs/tags/v}
          VERSION=${VERSION_RAW%%-*}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          IFS='.' read -ra PARTS <<< "$VERSION"
          MAJOR=${PARTS[0]:-0}
          MINOR=${PARTS[1]:-0}
          PATCH=${PARTS[2]:-0}
          BUILD_NUMBER=$((MAJOR * 1000000 + MINOR * 1000 + PATCH))
          echo "build_number=${BUILD_NUMBER}" >> $GITHUB_OUTPUT

      - name: Determine iOS destination
        id: destination
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          if [[ "$TAG" == *-* ]]; then
            SUFFIX="${TAG#*-}"
            case "$SUFFIX" in
              beta)  LANE="beta_external" ;;
              alpha) LANE="alpha_external" ;;
              *)     LANE="internal" ;;
            esac
          else
            LANE="appstore"
          fi
          echo "lane=${LANE}" >> $GITHUB_OUTPUT

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: ${{ steps.flutter_version.outputs.version }}
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            ${{ env.WORK_DIR }}/.dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Cache CocoaPods
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.WORK_DIR }}/ios/Pods
            ~/Library/Caches/CocoaPods
          key: pods-${{ runner.os }}-${{ hashFiles('**/Podfile.lock') }}
          restore-keys: pods-${{ runner.os }}-

      - name: Install Apple Certificate
        uses: apple-actions/import-codesign-certs@v5
        with:
          p12-file-base64: ${{ secrets.P12_DIST_CERT }}
          p12-password: ${{ secrets.P12_PASSWORD }}
          keychain-password: "randompassword"

      - name: Install Provisioning Profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/distribution.mobileprovision

      - name: Build
        run: |
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs
          dart run intl_utils:generate

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Create .env File
        run: |
          echo "BASE_URL=${{ vars.BASE_URL }}" > .env
          echo "SENTRY_DSN=${{ vars.SENTRY_DSN }}" >> .env
          echo "IOS_REVENUE_CAT_API_KEY=${{ secrets.IOS_REVENUE_CAT_API_KEY }}" >> .env
          echo "ANDROID_REVENUE_CAT_API_KEY=${{ secrets.ANDROID_REVENUE_CAT_API_KEY }}" >> .env

      - name: Build Release IPA
        run: |
          flutter build ipa --release \
            --flavor production \
            --export-options-plist=ios/ExportOptions.plist \
            --dart-define-from-file .env \
            --obfuscate \
            --split-debug-info=build/debug-info \
            --build-name=${{ steps.version.outputs.version }} \
            --build-number=${{ steps.version.outputs.build_number }}

      - name: Upload symbols to Sentry (iOS)
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
        run: |
          curl -sL https://sentry.io/get-cli/ | bash
          sentry-cli debug-files upload --include-sources build/debug-info
          sentry-cli debug-files upload --include-sources build/ios/archive/Runner.xcarchive/dSYMs

      - name: Upload iOS Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ios-release-${{ steps.version.outputs.version }}
          path: invman_flutter/build/ios/ipa/*.ipa
          if-no-files-found: error
          retention-days: 7

      - name: Find IPA file
        id: find_ipa
        run: |
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" -type f | head -1)
          echo "ipa_path=${IPA_PATH}" >> $GITHUB_OUTPUT

      - name: Set up Ruby and install fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: ${{ env.WORK_DIR }}/ios

      - name: Run fastlane (${{ steps.destination.outputs.lane }})
        working-directory: ${{ env.WORK_DIR }}/ios
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          IPA_PATH: ${{ github.workspace }}/${{ env.WORK_DIR }}/${{ steps.find_ipa.outputs.ipa_path }}
        run: bundle exec fastlane ios ${{ steps.destination.outputs.lane }}
